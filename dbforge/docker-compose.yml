version: '3.8'

services:
  dbforge:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    volumes:
      # Persist config and logs across restarts
      - dbforge-config:/var/www/html/dbforge/config.php
      - dbforge-logs:/var/www/html/dbforge/logs
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dbforge_root_pass
      MYSQL_DATABASE: demo
      MYSQL_USER: dbforge
      MYSQL_PASSWORD: dbforge_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdbforge_root_pass"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
  dbforge-config:
  dbforge-logs:
